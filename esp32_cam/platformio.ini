[env:seeed_xiao_esp32s3]
platform  = espressif32 @ ^6.4.0
board     = seeed_xiao_esp32s3
framework = arduino

monitor_speed          = 115200
board_build.partitions = huge_app.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    links2004/WebSockets @ ^2.4.1
    bblanchon/ArduinoJson @ ^7.1.0
